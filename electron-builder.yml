appId: com.virtual-assistant-desktop
productName: Virtual Assistant Desktop
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*
win:
  target:
    - nsis
  icon: build/icon.ico
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
mac:
  target:
    - dmg
    - zip
  icon: build/icon.icns
  category: public.app-category.entertainment
  darkModeSupport: true
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
asar: true
extraMetadata:
  main: dist-electron/main.js
