<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>影片動作轉換器</title>
    <link rel="stylesheet" href="/src/video-converter/style.css" />
  </head>
  <body>
    <div id="vc-root">
      <header id="vc-toolbar">
        <h1 id="vc-title">影片動作轉換器</h1>
        <div id="vc-toolbar-actions">
          <button id="vc-load-video-btn" type="button">載入影片</button>
          <button id="vc-load-vrm-btn" type="button">切換 VRM</button>
          <button id="vc-start-btn" type="button" disabled>開始擷取</button>
          <button id="vc-stop-btn" type="button" disabled>停止</button>
          <button id="vc-hq-btn" type="button" disabled>高品質處理</button>
          <button id="vc-export-btn" type="button" disabled>匯出</button>
        </div>
        <input id="vc-file-input" type="file" accept="video/*" hidden />
      </header>

      <main id="vc-body">
        <section id="vc-left" class="vc-pane">
          <div class="vc-pane-label">影片來源</div>
          <div id="vc-video-stage">
            <video id="vc-video" preload="auto" playsinline muted></video>
            <canvas id="vc-skeleton-overlay"></canvas>
          </div>
          <div id="vc-video-placeholder">
            尚未載入影片<br />
            <small>Phase 1 骨架階段，按鈕暫不可用</small>
          </div>
        </section>

        <section id="vc-right" class="vc-pane">
          <div class="vc-pane-label">VRM 預覽</div>
          <div id="vc-preview-stage">
            <canvas id="vc-preview-canvas"></canvas>
          </div>
          <div id="vc-preview-placeholder">
            尚未載入 VRM<br />
            <small>點擊「切換 VRM」載入</small>
          </div>
        </section>
      </main>

      <footer id="vc-footer">
        <div id="vc-timeline-container"></div>
        <div id="vc-status">Phase 1 — 視窗骨架</div>
      </footer>
    </div>

    <script type="module" src="/src/video-converter/main.ts"></script>
  </body>
</html>
