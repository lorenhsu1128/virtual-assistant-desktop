<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>瀏覽 VRM 模型</title>
    <link rel="stylesheet" href="/src/vrm-picker/style.css" />
  </head>
  <body>
    <div id="picker-root">
      <div id="picker-header">
        <div id="picker-folder-row">
          <span id="picker-folder-label">資料夾：</span>
          <span id="picker-folder-path">（尚未選擇）</span>
          <button id="picker-folder-btn" type="button">選擇資料夾</button>
        </div>
      </div>
      <div id="picker-body">
        <div id="picker-list-pane">
          <ul id="picker-file-list"></ul>
          <div id="picker-empty-hint" class="hidden">資料夾中沒有 .vrm 檔案</div>
        </div>
        <div id="picker-preview-pane">
          <canvas id="picker-preview-canvas"></canvas>
          <div id="picker-preview-hint">請從左側選擇模型</div>
          <div id="picker-preview-controls-overlay" class="hidden">
            <div class="control-row hidden" id="control-undress-row">
              <span class="control-label">脫衣</span>
              <label class="control-switch">
                <input type="checkbox" id="control-undress-toggle" />
                <span class="control-switch-slider"></span>
              </label>
            </div>
            <div class="control-row hidden" id="control-expression-row">
              <label class="control-label" for="control-expression-select">表情</label>
              <select id="control-expression-select" class="control-select">
                <option value="">（無）</option>
              </select>
            </div>
          </div>
          <div id="picker-model-info-overlay" class="hidden">
            <div class="info-section">
              <div class="info-row">
                <span class="info-label">模型</span>
                <span class="info-value" id="info-name">—</span>
              </div>
              <div class="info-row">
                <span class="info-label">VRM 版本</span>
                <span class="info-value" id="info-version">—</span>
              </div>
              <div class="info-row">
                <span class="info-label">可換衣物</span>
                <span class="info-value" id="info-clothes">—</span>
              </div>
              <div class="info-row">
                <span class="info-label">可脫衣</span>
                <span class="info-value" id="info-undress">—</span>
              </div>
            </div>
            <div class="info-section">
              <div class="info-label info-expr-label">
                Expressions（<span id="info-expr-count">0</span>）
              </div>
              <ul id="info-expr-list" class="info-expr-list"></ul>
            </div>
          </div>
        </div>
      </div>
      <div id="picker-footer">
        <div id="picker-status"></div>
        <div id="picker-buttons">
          <button id="picker-cancel-btn" type="button">取消</button>
          <button id="picker-apply-btn" type="button" disabled>套用</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/vrm-picker/main.ts"></script>
  </body>
</html>
