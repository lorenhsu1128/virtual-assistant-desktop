<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent 對話</title>
    <link rel="stylesheet" href="/src-bubble/style.css" />
  </head>
  <body>
    <div id="bubble-root">
      <header id="bubble-header">
        <span id="bubble-title">Agent</span>
        <span id="bubble-status" data-status="offline">offline</span>
        <button id="bubble-close-btn" type="button" title="隱藏">✕</button>
      </header>
      <main id="bubble-log"></main>
      <footer id="bubble-input-area">
        <textarea
          id="bubble-input"
          rows="2"
          placeholder="輸入訊息，Enter 送出（Shift+Enter 換行）"
        ></textarea>
        <div id="bubble-actions">
          <button id="bubble-send-btn" type="button">送出</button>
        </div>
      </footer>
    </div>
    <script type="module" src="/src-bubble/main.ts"></script>
  </body>
</html>
