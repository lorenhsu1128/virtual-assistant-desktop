<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>影片動捕工作站</title>
    <link rel="stylesheet" href="/src/mocap-studio/style.css" />
  </head>
  <body>
    <div id="mocap-root">
      <!-- 上方工具列 -->
      <div id="mocap-topbar">
        <div id="mocap-topbar-left">
          <button id="mocap-load-video-btn" type="button">載入影片</button>
          <label class="mocap-field">
            <span class="mocap-field-label">引擎</span>
            <select id="mocap-engine-select" disabled>
              <option value="">（尚未實作）</option>
            </select>
          </label>
          <button id="mocap-load-fixture-btn" type="button" class="mocap-dev-btn">[dev] 載入測試 fixture</button>
          <button id="mocap-detect-pose-btn" type="button" class="mocap-dev-btn" disabled>[dev] 偵測姿態</button>
        </div>
        <div id="mocap-topbar-right">
          <button id="mocap-convert-btn" type="button" disabled>轉換</button>
          <button id="mocap-export-btn" type="button" disabled>匯出 .vrma</button>
        </div>
      </div>

      <!-- 中間主區：左影片 / 右預覽 -->
      <div id="mocap-body">
        <div id="mocap-video-pane">
          <div id="mocap-video-wrapper">
            <video id="mocap-video-element" class="mocap-video"></video>
            <canvas id="mocap-video-overlay" class="mocap-video-overlay"></canvas>
          </div>
          <div id="mocap-video-controls">
            <button id="mocap-play-btn" type="button" disabled>▶ 播放</button>
            <span id="mocap-time-display">00:00.000 / 00:00.000</span>
          </div>
        </div>
        <div id="mocap-preview-pane">
          <canvas id="mocap-preview-canvas"></canvas>
          <div id="mocap-preview-hint" class="hidden">尚未載入 VRM 模型</div>
        </div>
      </div>

      <!-- 下方時間軸（預設 disabled，載入影片後啟用） -->
      <div id="mocap-timeline" class="timeline-disabled">
        <div class="tl-track" id="mocap-tl-track">
          <div class="tl-range" id="mocap-tl-range"></div>
          <div class="tl-playhead" id="mocap-tl-playhead"></div>
          <div class="tl-handle tl-handle-in" id="mocap-tl-in">
            <div class="tl-handle-label" id="mocap-tl-in-label">00:00.000</div>
          </div>
          <div class="tl-handle tl-handle-out" id="mocap-tl-out">
            <div class="tl-handle-label" id="mocap-tl-out-label">00:00.000</div>
          </div>
        </div>
      </div>

      <!-- 狀態列 -->
      <div id="mocap-statusbar">
        <span id="mocap-status">就緒</span>
      </div>
    </div>
    <script type="module" src="/src/mocap-studio/main.ts"></script>
  </body>
</html>
